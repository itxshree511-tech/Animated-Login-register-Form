<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="shortcut icon" href="favicon.svg" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


</head>

<body>
    <!-- Navbar -->
    <!-- Navbar -->
    <nav class="navbar fixed-top navbar-custom">
        <div class="container-fluid d-flex justify-content-center text-custom">
            <a class="navbar-brand text-center" href="#">Login & Register Form created By Shery</a>
        </div>
    </nav>

    <div class="container">

        <!-- LOGIN -->
        <div class="form-box login">
            <form>

                <h1>Login</h1>

                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="forget-link">
                    <a href="#" class="pointer">Forgot Password?</a>
                </div>

                <button type="submit" class="btn pointer">Login</button>

                <p>or login with social platforms</p>

                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-google"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                </div>

            </form>
        </div>


        <!-- REGISTER -->
        <div class="form-box register">

            <form>

                <h1>Registration</h1>

                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <button type="submit" class="btn pointer">Register</button>

                <p>or register with social platforms</p>

                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-google"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                </div>

            </form>

        </div>


        <!-- TOGGLE PANEL -->

        <div class="toggle-box">

            <div class="toggle-panel toggle-left">

                <h1>Hello, Friend!</h1>

                <p>Don't have an account?</p>

                <button class="btn register-btn pointer">Register</button>

            </div>


            <div class="toggle-panel toggle-right">

                <h1>Welcome Back!</h1>

                <p>Already have an account?</p>

                <button class="btn login-btn pointer">Login</button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
